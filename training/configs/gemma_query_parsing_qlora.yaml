run_name: ask-physics-gemma-query-parsing-qlora-v0.1

model:
  base_model: google/gemma-4-E4B-it
  trust_remote_code: false
  torch_dtype: bfloat16
  attn_implementation: eager

data:
  train_file: training/data/query_parsing/train.jsonl
  eval_file: training/data/query_parsing/dev.jsonl
  max_seq_length: 768
  preprocessing_num_workers: 1

output:
  output_dir: training/runs/gemma-query-parsing-qlora
  save_total_limit: 2
  push_to_hub: false
  hub_model_id: null

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true

lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj.linear
    - k_proj.linear
    - v_proj.linear
    - o_proj.linear
    - gate_proj.linear
    - up_proj.linear
    - down_proj.linear

training:
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.0002
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  optim: paged_adamw_8bit
  logging_steps: 10
  eval_strategy: steps
  eval_steps: 50
  save_strategy: steps
  save_steps: 50
  bf16: true
  fp16: false
  gradient_checkpointing: true
  max_grad_norm: 0.3
  report_to:
    - tensorboard
  seed: 42

generation:
  max_new_tokens: 256
  temperature: 0.0
  top_p: 1.0
